name: vnbs_runtime
description: VNBS Visual Novel Runtime Engine - Core runtime for visual novel games created with Choccy IDE
version: 1.1.0
homepage: https://github.com/NGLSG/Berry_Runtime
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^5.2.1
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  video_player: ^2.8.1
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
